<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Class - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .otp-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.4s ease-out;
            margin-bottom: 20px;
        }
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .otp-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }
        .otp-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .resend-text {
            color: var(--text-secondary);
            font-size: 13px;
            text-align: center;
            margin-top: 5px;
        }
        .resend-link {
            color: var(--primary-color);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="toast" class="toast">OTP sent successfully to your email!</div>

    <div class="login-container">
        <div class="glass-panel">
            <div class="login-header">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4f46e5" />
                                <stop offset="100%" stop-color="#4338ca" />
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your email to connect and access your live Zoom/Google Meet classes.</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>
                </div>

                <div class="role-selector" style="margin-bottom: 20px; display: flex; gap: 15px; justify-content: center; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                    <label style="display:flex; align-items:center; gap:5px; cursor:pointer; color:var(--text-primary); font-size: 14px; font-weight: 500;">
                        <input type="radio" name="role" value="student" checked style="accent-color:var(--primary-color); width: 16px; height: 16px;"> Student
                    </label>
                    <label style="display:flex; align-items:center; gap:5px; cursor:pointer; color:var(--text-primary); font-size: 14px; font-weight: 500;">
                        <input type="radio" name="role" value="teacher" style="accent-color:var(--primary-color); width: 16px; height: 16px;"> Teacher
                    </label>
                </div>

                <div class="otp-section" id="otp-section">
                    <label style="text-align: center;">Enter 4-digit OTP</label>
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" class="otp-box" id="otp1">
                        <input type="text" maxlength="1" class="otp-box" id="otp2">
                        <input type="text" maxlength="1" class="otp-box" id="otp3">
                        <input type="text" maxlength="1" class="otp-box" id="otp4">
                    </div>
                    <p class="resend-text">Didn't receive code? <span class="resend-link" id="resend-link">Resend</span></p>
                </div>

                <div class="form-actions">
                    <button type="button" class="login-btn" id="main-btn">Send OTP</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const mainBtn = document.getElementById('main-btn');
            const otpSection = document.getElementById('otp-section');
            const roleRadios = document.querySelectorAll('input[name="role"]');
            const toast = document.getElementById('toast');
            const resendLink = document.getElementById('resend-link');
            
            const otpBoxes = [
                document.getElementById('otp1'),
                document.getElementById('otp2'),
                document.getElementById('otp3'),
                document.getElementById('otp4')
            ];

            let currentState = 'request_otp';
            let generatedOtp = '';

            function generateOtp() {
                return Math.floor(1000 + Math.random() * 9000).toString();
            }

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 4000);
            }

            mainBtn.addEventListener('click', () => {
                if (currentState === 'request_otp') {
                    if (!emailInput.value) {
                        alert("Please enter a valid email address first.");
                        return;
                    }
                    
                    emailInput.disabled = true;
                    Array.from(roleRadios).forEach(r => r.disabled = true);
                    
                    mainBtn.textContent = "Verifying...";
                    
                    setTimeout(() => {
                        generatedOtp = generateOtp();
                        otpSection.style.display = 'flex';
                        mainBtn.textContent = "Verify & Login";
                        currentState = 'verify_otp';
                        showToast(OTP sent! (For testing, your code is:  + generatedOtp + ));
                        otpBoxes[0].focus();
                    }, 800);
                    
                } else if (currentState === 'verify_otp') {
                    const enteredOtp = otpBoxes.map(box => box.value).join('');
                    if (enteredOtp.length < 4) {
                        alert("Please enter the full 4-digit OTP.");
                        return;
                    }
                    
                    if (enteredOtp !== generatedOtp) {
                        alert("Invalid OTP! Please check the code and try again.");
                        otpBoxes.forEach(box => box.value = '');
                        otpBoxes[0].focus();
                        return;
                    }

                    mainBtn.textContent = "Authenticating...";
                    
                    setTimeout(() => {
                        const selectedRole = document.querySelector('input[name="role"]:checked').value;
                        window.location.href = 'dashboard.html?role=' + selectedRole;
                    }, 1000);
                }
            });

            resendLink.addEventListener('click', () => {
                generatedOtp = generateOtp();
                showToast(New OTP sent! (For testing, your code is:  + generatedOtp + ));
                otpBoxes.forEach(box => box.value = '');
                otpBoxes[0].focus();
            });

            otpBoxes.forEach((box, index) => {
                box.addEventListener('input', (e) => {
                    if (e.target.value && index < 3) {
                        otpBoxes[index + 1].focus();
                    }
                });
                
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        otpBoxes[index - 1].focus();
                    }
                });
            });
        });
    </script>
</body>
</html>
