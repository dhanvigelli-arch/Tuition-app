<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Class - Study Materials</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="materials.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <span>SmartClass</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Students
                </a>
                <a href="materials.html" class="active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Materials
                </a>
                <a href="#">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Attendance
                </a>
                <a href="#">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    Progress
                </a>
            </nav>
            <div class="user-profile">
                <div class="avatar">U</div>
                <div class="user-info">
                    <h4>User Account</h4>
                    <p>Loading Access...</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>Study Materials Hub</h1>
                    <p>Access notes, videos, and assignments</p>
                </div>
                <div class="header-actions">
                    <button class="upload-btn hidden" id="upload-material-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload Material
                    </button>
                    <button class="logout-btn" onclick="window.location.href='index.html'">
                        Logout
                    </button>
                </div>
            </header>

            <div class="materials-grid subjects-grid">
                <!-- Maths -->
                <div class="subject-card material-card">
                    <div class="card-header">
                        <div class="icon-wrapper math-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        </div>
                        <h3>Maths</h3>
                    </div>
                    <div class="card-body">
                        <ul class="material-list">
                            <li><span class="file-type pdf">PDF</span> Algebra Chapter 1.pdf</li>
                            <li><span class="file-type vid">VID</span> Trigonometry Intro.mp4</li>
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="join-btn view-btn">Open Folder</button>
                    </div>
                </div>

                <!-- Science -->
                <div class="subject-card material-card">
                    <div class="card-header">
                        <div class="icon-wrapper physics-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="M5 5l1.5 1.5"></path><path d="M17.5 17.5L19 19"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="M5 19l1.5-1.5"></path><path d="M17.5 6.5L19 5"></path></svg>
                        </div>
                        <h3>Science</h3>
                    </div>
                    <div class="card-body">
                        <ul class="material-list">
                            <li><span class="file-type pdf">PDF</span> Motion Notes.pdf</li>
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="join-btn view-btn">Open Folder</button>
                    </div>
                </div>

                <!-- Social -->
                <div class="subject-card material-card">
                    <div class="card-header">
                        <div class="icon-wrapper chemistry-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"></path><path d="M10 9h4"></path><path d="M12 3v18"></path><path d="M5 21h14"></path></svg>
                        </div>
                        <h3>Social</h3>
                    </div>
                    <div class="card-body">
                        <ul class="material-list">
                            <li><span class="file-type pdf">PDF</span> History WWII.pdf</li>
                        </ul>
                    </div>
                    <div class="card-footer">
                        <button class="join-btn view-btn">Open Folder</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="materials.js"></script>
</body>
</html>
